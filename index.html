<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RajShield — Rajasthan's Largest Automotive Protection Studio</title>
<meta name="description" content="Precision PPF, ceramic coatings, detailing and custom protection for exceptional vehicles. Rajasthan's premier automotive protection studio.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS CUSTOM PROPERTIES
   ============================================ */
:root {
  --gold: #c9a84c;
  --gold-light: #e8d48b;
  --gold-dark: #a07c1c;
  --black: #0a0a0a;
  --dark: #111111;
  --darker: #050505;
  --graphite: #1a1a1a;
  --white: #f5f5f5;
  --gray: #888888;
  --gray-light: #aaaaaa;
  --gray-dark: #444444;
  --glass: rgba(255,255,255,0.03);
  --glass-border: rgba(255,255,255,0.06);
  --font-body: 'Inter', -apple-system, sans-serif;
  --font-display: 'Playfair Display', serif;
  --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
  --ease-in-out: cubic-bezier(0.76, 0, 0.24, 1);
  --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
}

/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: auto; overflow-x: hidden; }
body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
ul, ol { list-style: none; }
::selection { background: var(--gold); color: var(--black); }

/* ============================================
   REDUCED MOTION
   ============================================ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  .preloader { display: none !important; }
  .reveal, .reveal-left, .reveal-right { opacity: 1 !important; transform: none !important; }
}

/* ============================================
   PRELOADER — Scene 01
   ============================================ */
.preloader {
  position: fixed; inset: 0; background: var(--darker);
  z-index: 10000; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 0;
}
.preloader-car {
  width: 280px; height: 100px; position: relative; margin-bottom: 40px;
}
.preloader-car svg { width: 100%; height: 100%; }
.preloader-car .car-outline {
  stroke-dasharray: 1000; stroke-dashoffset: 1000;
  stroke: var(--gold); stroke-width: 1; fill: none;
}
.preloader-progress {
  width: 200px; height: 1px; background: rgba(255,255,255,0.1);
  position: relative; overflow: hidden; margin-bottom: 15px;
}
.preloader-progress-bar {
  position: absolute; top: 0; left: 0; height: 100%; width: 0;
  background: var(--gold);
}
.preloader-percent {
  font-size: 0.7rem; letter-spacing: 0.4em; color: var(--gray);
  font-variant-numeric: tabular-nums;
}
.preloader-brand {
  font-family: var(--font-display); font-size: 1.2rem; letter-spacing: 0.3em;
  color: var(--gold); margin-top: 30px; opacity: 0;
}

/* ============================================
   CUSTOM CURSOR
   ============================================ */
.cursor-ring {
  width: 24px; height: 24px; border: 1.5px solid rgba(201,168,76,0.5);
  border-radius: 50%; position: fixed; pointer-events: none;
  z-index: 9999; transition: width 0.3s var(--ease-out), height 0.3s var(--ease-out),
  border-color 0.3s ease, background 0.3s ease;
  mix-blend-mode: difference;
}
.cursor-ring.hover {
  width: 50px; height: 50px;
  background: rgba(201,168,76,0.08);
  border-color: var(--gold);
}
.cursor-dot {
  width: 4px; height: 4px; background: var(--gold);
  border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000;
}
@media (max-width: 1024px) { .cursor-ring, .cursor-dot { display: none; } }

/* ============================================
   NAVIGATION — Scene 00
   ============================================ */
.nav {
  position: fixed; top: 0; left: 0; width: 100%; padding: 28px 50px;
  display: flex; justify-content: space-between; align-items: center;
  z-index: 1000; transition: all 0.5s var(--ease-smooth);
}
.nav.scrolled {
  padding: 18px 50px;
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.nav-logo {
  font-family: var(--font-display); font-size: 1.4rem; font-weight: 700;
  letter-spacing: 0.15em; color: var(--white);
}
.nav-logo span { color: var(--gold); }
.nav-links {
  display: flex; gap: 36px; align-items: center;
}
.nav-links a {
  font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gray-light); position: relative; padding: 5px 0;
  transition: color 0.3s ease;
}
.nav-links a::after {
  content: ''; position: absolute; bottom: 0; left: 0;
  width: 0; height: 1px; background: var(--gold);
  transition: width 0.4s var(--ease-out);
}
.nav-links a:hover, .nav-links a.active { color: var(--white); }
.nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
.nav-cta {
  font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
  padding: 10px 24px; border: 1px solid var(--gold); border-radius: 2px;
  color: var(--gold); transition: all 0.3s ease;
}
.nav-cta:hover { background: var(--gold); color: var(--black); }

/* Mobile Menu */
.nav-menu-btn {
  display: none; flex-direction: column; gap: 5px; cursor: pointer;
  padding: 10px; z-index: 1002;
}
.nav-menu-btn span {
  width: 24px; height: 1.5px; background: var(--white);
  transition: all 0.3s ease; transform-origin: center;
}
.nav-menu-btn.open span:first-child { transform: rotate(45deg) translate(4px, 5px); }
.nav-menu-btn.open span:nth-child(2) { opacity: 0; }
.nav-menu-btn.open span:last-child { transform: rotate(-45deg) translate(4px, -5px); }

.mobile-menu {
  position: fixed; inset: 0; background: rgba(5,5,5,0.97);
  z-index: 999; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 30px; opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
  backdrop-filter: blur(30px);
}
.mobile-menu.open { opacity: 1; pointer-events: all; }
.mobile-menu a {
  font-family: var(--font-display); font-size: 2rem; color: var(--white);
  opacity: 0; transform: translateY(20px);
  transition: color 0.3s ease;
}
.mobile-menu a:hover { color: var(--gold); }

@media (max-width: 900px) {
  .nav { padding: 20px 25px; }
  .nav.scrolled { padding: 15px 25px; }
  .nav-links, .nav-cta { display: none; }
  .nav-menu-btn { display: flex; }
}

/* ============================================
   HERO — Scene 02
   ============================================ */
.hero {
  height: 100vh; min-height: 700px; position: relative;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; background: var(--darker);
}
.hero-media {
  position: absolute; inset: 0; z-index: 1;
}
.hero-media-inner {
  width: 100%; height: 100%;
  /* REPLACE: Add your real hero image/video here */
  background: linear-gradient(135deg, #0a0a0a 0%, #111 40%, #0a0a0a 100%);
  position: relative;
}
.hero-car-placeholder {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; opacity: 0;
}
.hero-car-placeholder svg { width: 65%; max-width: 800px; }
.hero-light-sweep {
  position: absolute; inset: 0; z-index: 2;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.03) 45%,
    rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 55%, transparent 100%);
  transform: translateX(-100%) skewX(-15deg); opacity: 0;
}
.hero-gradient-bottom {
  position: absolute; bottom: 0; left: 0; width: 100%; height: 40%;
  background: linear-gradient(to top, var(--darker), transparent);
  z-index: 3;
}
.hero-gradient-top {
  position: absolute; top: 0; left: 0; width: 100%; height: 25%;
  background: linear-gradient(to bottom, rgba(5,5,5,0.6), transparent);
  z-index: 3;
}
.hero-content {
  position: relative; z-index: 10; text-align: center; padding: 0 30px;
  max-width: 900px;
}
.hero-eyebrow {
  font-size: 0.65rem; letter-spacing: 0.6em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 28px;
  opacity: 0; transform: translateY(15px);
}
.hero-title {
  font-family: var(--font-display); font-size: clamp(2.2rem, 5.5vw, 4.5rem);
  font-weight: 700; line-height: 1.15; margin-bottom: 24px;
  opacity: 0; transform: translateY(30px);
}
.hero-title em { color: var(--gold); font-style: italic; }
.hero-subtitle {
  font-size: clamp(0.85rem, 1.2vw, 1rem); font-weight: 300;
  color: var(--gray-light); line-height: 1.7; max-width: 560px;
  margin: 0 auto 40px; opacity: 0; transform: translateY(20px);
}
.hero-actions {
  display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;
  opacity: 0; transform: translateY(20px);
}
.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 36px; background: var(--gold); color: var(--black);
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.25em;
  text-transform: uppercase; border-radius: 2px;
  transition: all 0.3s var(--ease-out); position: relative; overflow: hidden;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.3); }
.btn-primary::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: translateX(-100%); transition: transform 0.5s ease;
}
.btn-primary:hover::after { transform: translateX(100%); }
.btn-secondary {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 36px; border: 1px solid rgba(255,255,255,0.2);
  color: var(--white); font-size: 0.72rem; font-weight: 500;
  letter-spacing: 0.25em; text-transform: uppercase; border-radius: 2px;
  transition: all 0.3s var(--ease-out);
}
.btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
.hero-scroll-cue {
  position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
  z-index: 10; display: flex; flex-direction: column; align-items: center;
  gap: 8px; opacity: 0;
}
.hero-scroll-cue span {
  font-size: 0.6rem; letter-spacing: 0.5em; text-transform: uppercase;
  color: var(--gray);
}
.scroll-indicator {
  width: 1px; height: 40px; position: relative; overflow: hidden;
}
.scroll-indicator::after {
  content: ''; position: absolute; top: -100%; left: 0;
  width: 100%; height: 100%; background: var(--gold);
  animation: scrollDown 2s ease-in-out infinite;
}
@keyframes scrollDown {
  0% { top: -100%; } 50% { top: 100%; } 100% { top: 100%; }
}

/* ============================================
   AUTHORITY — Scene 03
   ============================================ */
.authority {
  padding: 160px 50px; position: relative; overflow: hidden;
  background: var(--black);
}
.authority-inner {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
  align-items: center;
}
.authority-statement {
  font-family: var(--font-display); font-size: clamp(1.8rem, 3.5vw, 3rem);
  font-weight: 700; line-height: 1.3;
}
.authority-statement em { color: var(--gold); font-style: italic; }
.authority-desc {
  font-size: 0.9rem; color: var(--gray); line-height: 1.8;
  margin-top: 20px; max-width: 450px;
}
.metrics-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 40px;
}
.metric {
  opacity: 0; transform: translateY(30px);
}
.metric-number {
  font-family: var(--font-display); font-size: clamp(2.5rem, 4vw, 3.5rem);
  font-weight: 700; color: var(--gold); line-height: 1;
  font-variant-numeric: tabular-nums;
}
.metric-suffix { font-size: 0.5em; color: var(--gold-light); }
.metric-label {
  font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gray); margin-top: 8px;
}
.metric-line {
  width: 30px; height: 1px; background: var(--gold); margin-top: 12px;
  transform: scaleX(0); transform-origin: left;
}

/* Rajasthan Map */
.authority-map {
  grid-column: 1 / -1; margin-top: 40px; position: relative;
  height: 200px; display: flex; align-items: center; justify-content: center;
}
.map-dot {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  background: var(--gold); opacity: 0; transform: scale(0);
}
.map-dot::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 1px solid var(--gold); opacity: 0;
  animation: mapPulse 2s ease-out infinite;
}
@keyframes mapPulse {
  0% { transform: scale(1); opacity: 0.5; }
  100% { transform: scale(2.5); opacity: 0; }
}
.map-label {
  position: absolute; font-size: 0.6rem; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--gray-light); white-space: nowrap;
  opacity: 0;
}

@media (max-width: 900px) {
  .authority { padding: 100px 25px; }
  .authority-inner { grid-template-columns: 1fr; gap: 50px; }
  .metrics-grid { grid-template-columns: 1fr 1fr; gap: 30px; }
}

/* ============================================
   PPF LAYER SEPARATION — Scene 04
   ============================================ */
.ppf-section {
  position: relative; min-height: 600vh;
}
.ppf-sticky {
  position: sticky; top: 0; height: 100vh; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: var(--darker);
}
.ppf-visual {
  position: relative; width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}
/* REPLACE: This is where your frame sequence or video goes */
.ppf-car-display {
  position: relative; width: 70%; max-width: 800px;
  aspect-ratio: 16/9;
}
.ppf-car-base {
  width: 100%; height: 100%; position: absolute; inset: 0;
  /* REPLACE with your car image */
  background: linear-gradient(135deg, #0f1923, #162033, #0d1520);
  border-radius: 8px; overflow: hidden;
}
.ppf-car-base::after {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 40%, rgba(201,168,76,0.05), transparent 60%);
}
.ppf-film-layer {
  position: absolute; inset: 0; border-radius: 8px;
  background: linear-gradient(135deg,
    rgba(255,255,255,0.06), rgba(255,255,255,0.02), rgba(255,255,255,0.04));
  border: 1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(1px);
  transform-origin: top center;
}
.ppf-film-shine {
  position: absolute; inset: 0; border-radius: 8px; overflow: hidden;
}
.ppf-film-shine::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: linear-gradient(45deg, transparent 30%,
    rgba(255,255,255,0.04) 45%, rgba(255,255,255,0.08) 50%,
    rgba(255,255,255,0.04) 55%, transparent 70%);
}
.ppf-annotation {
  position: absolute; display: flex; align-items: center; gap: 12px;
  opacity: 0; white-space: nowrap; z-index: 20;
}
.ppf-annotation-line {
  width: 50px; height: 1px; background: var(--gold);
}
.ppf-annotation-text {
  font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--gold);
}
.ppf-annotation-desc {
  font-size: 0.6rem; color: var(--gray); margin-top: 3px;
  letter-spacing: 0.05em; text-transform: none;
}
.ppf-annotation.ann-hood { top: 15%; right: -180px; }
.ppf-annotation.ann-front { top: 45%; right: -180px; }
.ppf-annotation.ann-side { bottom: 25%; right: -180px; }
.ppf-section-title {
  position: absolute; top: 12%; left: 50px; z-index: 20;
  max-width: 350px;
}
.ppf-section-title .section-label {
  font-size: 0.6rem; letter-spacing: 0.5em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.ppf-section-title .section-label::before {
  content: ''; width: 30px; height: 1px; background: var(--gold);
}
.ppf-section-title h2 {
  font-family: var(--font-display); font-size: clamp(1.5rem, 3vw, 2.5rem);
  font-weight: 700; line-height: 1.2; opacity: 0; transform: translateY(20px);
}
.ppf-section-title h2 em { color: var(--gold); font-style: italic; }
.ppf-closing {
  position: absolute; bottom: 12%; left: 50%; transform: translateX(-50%);
  text-align: center; z-index: 20; opacity: 0;
}
.ppf-closing p {
  font-family: var(--font-display); font-size: clamp(1.2rem, 2vw, 1.6rem);
  font-style: italic; color: var(--gold-light);
}

@media (max-width: 900px) {
  .ppf-section-title { left: 25px; max-width: 250px; }
  .ppf-annotation { display: none; }
  .ppf-car-display { width: 85%; }
}

/* ============================================
   MATERIAL SCIENCE — Scene 05
   ============================================ */
.material-section {
  padding: 0; position: relative;
}
.material-block {
  min-height: 100vh; display: flex; align-items: center;
  padding: 100px 50px; position: relative; overflow: hidden;
}
.material-block:nth-child(even) { background: var(--darker); }
.material-inner {
  max-width: 1200px; margin: 0 auto; width: 100%;
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px;
  align-items: center;
}
.material-block:nth-child(even) .material-inner { direction: rtl; }
.material-block:nth-child(even) .material-inner > * { direction: ltr; }
.material-visual {
  position: relative; aspect-ratio: 4/3; border-radius: 12px;
  overflow: hidden;
  /* REPLACE: Add your macro photography here */
  background: linear-gradient(135deg, #111, #1a1a2e);
}
.material-visual-overlay {
  position: absolute; inset: 0;
  background: radial-gradient(circle at 50% 50%, rgba(201,168,76,0.08), transparent 60%);
}
.material-visual-icon {
  position: absolute; inset: 0; display: flex; align-items: center;
  justify-content: center; font-size: 4rem; opacity: 0.2;
}
.material-info .section-label {
  font-size: 0.6rem; letter-spacing: 0.5em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.material-info .section-label::before {
  content: ''; width: 30px; height: 1px; background: var(--gold);
}
.material-info h3 {
  font-family: var(--font-display); font-size: clamp(1.5rem, 2.5vw, 2.2rem);
  font-weight: 700; line-height: 1.3; margin-bottom: 16px;
}
.material-info h3 em { color: var(--gold); font-style: italic; }
.material-info p {
  font-size: 0.9rem; color: var(--gray); line-height: 1.8;
}
.material-stat {
  margin-top: 25px; display: flex; gap: 30px;
}
.material-stat-item {
  padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.08);
}
.material-stat-value {
  font-family: var(--font-display); font-size: 1.5rem;
  font-weight: 700; color: var(--gold);
}
.material-stat-label {
  font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--gray); margin-top: 4px;
}

@media (max-width: 900px) {
  .material-block { padding: 80px 25px; }
  .material-inner { grid-template-columns: 1fr; gap: 40px; }
  .material-block:nth-child(even) .material-inner { direction: ltr; }
}

/* ============================================
   SERVICES OVERVIEW — Scene 06
   ============================================ */
.services-section {
  padding: 160px 50px; background: var(--black);
  position: relative;
}
.services-header {
  max-width: 1200px; margin: 0 auto 80px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px;
  align-items: end;
}
.services-header .section-label {
  font-size: 0.6rem; letter-spacing: 0.5em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 12px;
  display: flex; align-items: center; gap: 12px;
}
.services-header .section-label::before {
  content: ''; width: 30px; height: 1px; background: var(--gold);
}
.services-header h2 {
  font-family: var(--font-display); font-size: clamp(2rem, 4vw, 3.2rem);
  font-weight: 700; line-height: 1.2;
}
.services-header h2 em { color: var(--gold); font-style: italic; }
.services-header p {
  font-size: 0.9rem; color: var(--gray); line-height: 1.8;
}

/* Service Tabs */
.services-tabs {
  max-width: 1200px; margin: 0 auto;
  display: grid; grid-template-columns: 300px 1fr; gap: 0;
  min-height: 500px;
}
.service-tab-list {
  border-right: 1px solid rgba(255,255,255,0.06);
  display: flex; flex-direction: column;
}
.service-tab {
  padding: 28px 30px; cursor: pointer; position: relative;
  transition: all 0.3s ease; border-left: 2px solid transparent;
}
.service-tab:hover { background: rgba(255,255,255,0.02); }
.service-tab.active {
  border-left-color: var(--gold);
  background: rgba(201,168,76,0.03);
}
.service-tab-index {
  font-size: 0.6rem; letter-spacing: 0.3em; color: var(--gray-dark);
  margin-bottom: 6px; font-variant-numeric: tabular-nums;
}
.service-tab.active .service-tab-index { color: var(--gold); }
.service-tab-name {
  font-family: var(--font-display); font-size: 1.1rem; font-weight: 700;
  transition: color 0.3s ease;
}
.service-tab.active .service-tab-name { color: var(--gold); }
